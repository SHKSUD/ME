<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confused Aatma — Thoughts & Threads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --muted: #6e6e73;
            --border: #e5e5e5;
            --accent: #007aff;
            --x-brand: #000000;
        }

        .dark-mode {
            --bg: #000000;
            --text: #f5f5f7;
            --muted: #86868b;
            --border: #262626;
            --accent: #0a84ff;
            --x-brand: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.2s ease;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .prose {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .prose h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        .post-card {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
            cursor: pointer;
        }

        .post-card:last-child {
            border-bottom: none;
        }

        .nav-link {
            color: var(--muted);
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .active-nav {
            color: var(--text);
            font-weight: 600;
        }

        .x-button {
            background-color: var(--x-brand);
            color: var(--bg);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .x-button:hover {
            opacity: 0.8;
        }

        blockquote {
            border-left: 3px solid var(--border);
            padding-left: 1.5rem;
            font-style: italic;
            color: var(--muted);
            margin: 2rem 0;
        }

        .hidden { display: none; }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-2xl mx-auto px-6 py-16">
        <!-- HEADER -->
        <header class="flex justify-between items-start mb-16">
            <div>
                <a href="#" onclick="navigateTo('feed')" class="text-xl font-bold tracking-tight">Confused Aatma</a>
                <p class="text-sm text-[var(--muted)] mt-1">Exploring the chaos between code and consciousness.</p>
            </div>
            
            <nav class="flex items-center space-x-5 text-[15px]">
                <a onclick="navigateTo('feed')" id="nav-writing" class="nav-link active-nav">Blog</a>
                <!-- Link to your X Profile -->
                <a href="https://x.com/ConfusedAatma" target="_blank" class="x-button">Follow on 𝕏</a>
                <button id="theme-toggle" class="opacity-50 hover:opacity-100 transition-opacity">
                    <svg id="theme-icon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path>
                    </svg>
                </button>
            </nav>
        </header>

        <!-- MAIN CONTENT -->
        <main id="app">
            <!-- Content injected by JS -->
        </main>

        <!-- FOOTER -->
        <footer class="mt-24 pt-8 border-t border-[var(--border)] text-[13px] text-[var(--muted)]">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <p>&copy; 2024 Confused Aatma. All rights reserved.</p>
                <div class="flex space-x-4">
                    <a href="https://x.com/ConfusedAatma" target="_blank" class="hover:text-[var(--text)]">𝕏 (Twitter)</a>
                    <a href="#" class="hover:text-[var(--text)]">GitHub</a>
                    <a href="#" class="hover:text-[var(--text)]">RSS</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const BLOG_POSTS = [
            {
                id: 'welcome-aatma',
                title: "Welcome to the Confused Mind",
                date: "Mar 20, 2024",
                readTime: "3 min read",
                excerpt: "Why I started this blog and what to expect from the Confused Aatma handle.",
                content: `
	 <p>कुछ बेचें तो ही कुछ खाएँ</p>
                    <p>Welcome. If you're coming here from my <strong>𝕏 (Twitter)</strong>, you know I love diving into complex topics in short bursts. This blog is my space to expand on those threads.</p>
                    <p>कुछ बेचें तो ही कुछ खाएँ,
उफ़ ये ज़िन्दगी!
क्या सौदा करें, कहाँ जाएँ,
किसको आज़माएँ?

सब निकले सौदाबाज़,
सब निकले रास्ते अपने,
भूले से भी मुड़के न देखा किसी ने,
दिया मैंने किसको क्या... क्या ही बताएँ?

अभी तो सोचूँ बेचूँ क्या?
दिल्ली में रहें तो खाएँ क्या?
ग़ालिब की बात सच ही निकली,
मुझसे 'बेसबब' सब रंजिश आज़माएँ।

कुछ बेचें तो ही कुछ खाएँ,
बचा जो भी, अब उसी को ले के बाज़ार जाएँ।</p>
                    <h2>Let's Connect</h2>
                    <p>I'll be sharing every new post on my timeline. If you have thoughts, the best way to reach me is still over at <a href="https://x.com/ConfusedAatma" class="text-[var(--accent)] hover:underline">@ConfusedAatma</a>.</p>
                `
            },
            {
                id: 'resilient-systems',
                title: "The Architecture of Resilient Systems",
                date: "Mar 15, 2024",
                readTime: "12 min read",
                excerpt: "Exploring why some software patterns survive decades while others fail within months of deployment.",
                content: `
                    <p>In the world of software engineering, we often talk about <strong>scalability</strong> and <strong>performance</strong>, but we rarely talk about <em>resilience</em>.</p>
                    <p>A resilient system isn't just one that stays up; it's one that recovers gracefully from the inevitable chaos of the real world.</p>
                    <h2>The Fallacy of Total Coverage</h2>
                    <p>Testing is vital, but coverage numbers are lying to you. Real resilience comes from isolated failures.</p>
                    <blockquote>
                        "The best error handling is often just letting it crash and having a parent process that knows how to clean up the mess."
                    </blockquote>
                `
            }
        ];

        function renderFeed() {
            const container = document.getElementById('app');
            let html = `<div class="divide-y divide-[var(--border)]">`;

            BLOG_POSTS.forEach(post => {
                html += `
                    <article class="post-card group" onclick="navigateTo('post', '${post.id}')">
                        <time class="text-[13px] text-[var(--muted)] font-medium mb-1 block">${post.date.toUpperCase()}</time>
                        <h2 class="post-title group-hover:text-[var(--accent)] transition-colors">${post.title}</h2>
                        <p class="text-[var(--muted)] text-[15px] mt-2 line-clamp-2">${post.excerpt}</p>
                    </article>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
            document.getElementById('nav-writing').classList.add('active-nav');
        }

        function renderPost(postId) {
            const post = BLOG_POSTS.find(p => p.id === postId);
            if (!post) { navigateTo('feed'); return; }

            const container = document.getElementById('app');
            container.innerHTML = `
                <article>
                    <header class="mb-10">
                        <time class="text-[13px] text-[var(--muted)] font-bold mb-2 block tracking-widest uppercase">${post.date}</time>
                        <h1 class="text-4xl font-extrabold tracking-tight leading-[1.1] mb-6">${post.title}</h1>
                        <div class="h-1 w-12 bg-[var(--text)] opacity-10"></div>
                    </header>

                    <div class="prose text-[var(--text)]">
                        ${post.content}
                    </div>
                    
                    <div class="mt-16 pt-8 border-t border-[var(--border)] flex justify-between items-center">
                        <button onclick="navigateTo('feed')" class="text-sm font-bold text-[var(--accent)] hover:underline">
                            ← BACK TO BLOG
                        </button>
                        <a href="https://x.com/intent/tweet?text=Reading: ${encodeURIComponent(post.title)} by @ConfusedAatma" target="_blank" class="text-xs font-bold bg-[var(--border)] px-3 py-1 rounded-full hover:bg-[var(--muted)] hover:text-white transition-all">
                            SHARE ON 𝕏
                        </a>
                    </div>
                </article>
            `;
            document.getElementById('nav-writing').classList.remove('active-nav');
        }

        function navigateTo(view, id = null) {
            if (view === 'post') {
                renderPost(id);
                window.location.hash = `post/${id}`;
            } else {
                renderFeed();
                window.location.hash = '';
            }
            window.scrollTo(0, 0);
        }

        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
            const hash = window.location.hash;
            if (hash.startsWith('#post/')) {
                navigateTo('post', hash.replace('#post/', ''));
            } else {
                renderFeed();
            }
        });
    </script>
</body>
</html>
